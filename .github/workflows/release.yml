name: Release CI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release, for example v2.2.0"
        required: true
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      asset_prefix: ${{ steps.release.outputs.asset_prefix }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Validate release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          version="${tag#v}"
          cargo_version="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
          if [ "$cargo_version" != "$version" ]; then
            echo "Cargo.toml version ($cargo_version) does not match release tag ($version)" >&2
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "asset_prefix=clash-verge-service-ipc-$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: i686-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Install Rust
        if: matrix.os != 'ubuntu-latest'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Add Rust target
        if: matrix.os != 'ubuntu-latest'
        run: rustup target add ${{ matrix.target }}

      - name: Setup macOS cross compilation
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          echo "CARGO_TARGET_$(echo ${{ matrix.target }} | tr '[:lower:]' '[:upper:]' | tr '-' '_')_LINKER=clang" >> "$GITHUB_ENV"
          echo "CC_$(echo ${{ matrix.target }} | tr '-' '_')=clang" >> "$GITHUB_ENV"
          echo "CXX_$(echo ${{ matrix.target }} | tr '-' '_')=clang++" >> "$GITHUB_ENV"

          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"
            echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> "$GITHUB_ENV"
          elif [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"
            echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          fi

      - name: Build
        if: matrix.os != 'ubuntu-latest'
        run: cargo build --release --target ${{ matrix.target }} --features standalone --verbose

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/build-for-linux
        with:
          target: ${{ matrix.target }}
          features: standalone

      - name: CodeSign macOS binaries (ad-hoc)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          # NextHubX fork:无 Apple Developer 证书,改用 ad-hoc 签名(codesign -s -),
          # 与 NextHubX 应用本身的 adhoc 分发一致;给二进制一个稳定的设计标识,无需任何 secrets。
          for bin in clash-verge-service clash-verge-service-install clash-verge-service-uninstall; do
            file "target/${{ matrix.target }}/release/$bin"
            lipo -info "target/${{ matrix.target }}/release/$bin" || true
            codesign --force -s - \
              --identifier "com.nexthubx.app.service" \
              "target/${{ matrix.target }}/release/$bin"
            codesign -dvv "target/${{ matrix.target }}/release/$bin" || true
          done

      - name: Package Windows binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "${{ needs.prepare.outputs.asset_prefix }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path package -Force | Out-Null
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/clash-verge-service.exe" package/
          Copy-Item "target/${{ matrix.target }}/release/clash-verge-service-install.exe" package/
          Copy-Item "target/${{ matrix.target }}/release/clash-verge-service-uninstall.exe" package/
          Copy-Item LICENSE package/
          Compress-Archive -Path package/* -DestinationPath "dist/$asset.zip" -Force

      - name: Package Unix binaries
        if: runner.os != 'Windows'
        shell: bash
        run: |
          asset="${{ needs.prepare.outputs.asset_prefix }}-${{ matrix.target }}"
          mkdir -p package dist
          cp "target/${{ matrix.target }}/release/clash-verge-service" package/
          cp "target/${{ matrix.target }}/release/clash-verge-service-install" package/
          cp "target/${{ matrix.target }}/release/clash-verge-service-uninstall" package/
          cp LICENSE package/
          tar -czf "dist/$asset.tar.gz" -C package .

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: clash-verge-service-ipc ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
